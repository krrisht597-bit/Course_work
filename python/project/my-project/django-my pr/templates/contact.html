{% extends 'base.html' %}

{% block title %}Contact Us | Modern Jackets{% endblock %}
{% block body_class %}inner-page{% endblock %}
{% block header_class %}header--solid{% endblock %}

{% block content %}
   <section class="contact container">
      <h1 class="section__title">Contact Us</h1>
      <form method="POST" class="contact__form">
         {% csrf_token %}
         {{ form.as_p }}
         <button type="submit" class="home__button">Send Message</button>
      </form>
   </section>
{% endblock %}
