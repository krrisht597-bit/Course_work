<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Campus Registrar{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#F5F0E1;
    --parchment-dark:#EDE5CE;
    --ink:#242019;
    --ink-soft:#5B5648;
    --navy:#1F3A54;
    --navy-dark:#152a3d;
    --gold:#B9852B;
    --sage:#516B4E;
    --plum:#6B3F52;
    --rule:#D8CEAF;
    --error:#9C3B3B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      repeating-linear-gradient(180deg, transparent, transparent 27px, rgba(31,58,84,0.05) 28px),
      var(--parchment);
    font-family:'Inter', sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
  }
  .topbar{
    background:var(--navy);
    color:var(--parchment);
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:3px double var(--gold);
  }
  .brand{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.25rem;
    letter-spacing:0.02em;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand small{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.6rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
  }
  .topbar nav a{
    color:var(--parchment);
    text-decoration:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-left:22px;
    padding-bottom:3px;
    border-bottom:1px solid transparent;
    transition:border-color .15s ease, opacity .15s ease;
    opacity:.85;
  }
  .topbar nav a:hover{border-color:var(--gold); opacity:1;}

  main{
    flex:1;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:56px 20px;
  }

  /* --- signature element: library / registrar index-card --- */
  .card{
    position:relative;
    width:100%;
    max-width:460px;
    background:#FFFDF7;
    border:1px solid var(--rule);
    box-shadow:0 1px 0 var(--rule), 0 18px 40px -22px rgba(31,58,84,0.35);
    padding:44px 38px 36px;
  }
  .card.wide{max-width:620px;}
  .card::before{ /* grommet hole, top-left, like a real index card */
    content:"";
    position:absolute;
    top:18px; left:18px;
    width:10px; height:10px;
    border-radius:50%;
    background:var(--parchment);
    box-shadow:inset 0 0 0 1.5px var(--rule), 0 1px 2px rgba(0,0,0,.15) inset;
  }
  .tab{ /* folded catalog tab */
    position:absolute;
    top:-15px; left:36px;
    background:var(--gold);
    color:#FFFDF7;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-weight:600;
    padding:7px 16px 7px;
    clip-path: polygon(0 0, 100% 0, 96% 100%, 4% 100%);
  }
  .tab.sage{background:var(--sage);}
  .tab.plum{background:var(--plum);}

  .card h1, .card h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    color:var(--navy);
    margin:6px 0 4px;
  }
  .card h1{font-size:1.9rem;}
  .card h2{font-size:1.5rem;}
  .subtext{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin-bottom:26px;
    padding-bottom:22px;
    border-bottom:1px dashed var(--rule);
  }

  label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .field{margin-bottom:18px;}
  .row-2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  input[type=text], input[type=password], textarea, select{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size:0.95rem;
    color:var(--ink);
    background:#FBF8EF;
    border:1px solid var(--rule);
    border-radius:2px;
    padding:11px 12px;
    transition:border-color .15s ease, background .15s ease;
  }
  input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:var(--navy);
    background:#fff;
  }
  textarea{min-height:70px; resize:vertical;}

  button, .btn{
    width:100%;
    display:inline-block;
    text-align:center;
    background:var(--navy);
    color:var(--parchment);
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.1em;
    text-transform:uppercase;
    font-size:0.75rem;
    font-weight:600;
    border:none;
    padding:14px;
    cursor:pointer;
    text-decoration:none;
    transition:background .15s ease;
  }
  button:hover, .btn:hover{background:var(--navy-dark);}
  .btn + .btn{margin-top:12px;}
  .btn-sage{background:var(--sage);}
  .btn-sage:hover{background:#3f5a3d;}
  .btn-plum{background:var(--plum);}
  .btn-plum:hover{background:#54303f;}

  .msg{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.75rem;
    letter-spacing:0.03em;
    padding:10px 12px;
    margin-bottom:20px;
    border-left:3px solid var(--error);
    background:rgba(156,59,59,0.07);
    color:var(--error);
  }
  .msg.ok{border-color:var(--sage); background:rgba(81,107,78,0.08); color:var(--sage);}
  .msg:empty{display:none;}

  .foot-link{
    margin-top:24px;
    padding-top:18px;
    border-top:1px dashed var(--rule);
    text-align:center;
    font-size:0.85rem;
    color:var(--ink-soft);
  }
  .foot-link a{color:var(--navy); font-weight:600; text-decoration:none; border-bottom:1px solid var(--gold);}

  .stamp{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--sage);
    border:1.5px solid var(--sage);
    border-radius:3px;
    padding:3px 9px;
    transform:rotate(-3deg);
  }
  .stamp.plum{color:var(--plum); border-color:var(--plum);}

  .id-photo{
    width:64px; height:64px;
    border:1.5px solid var(--rule);
    background:var(--parchment-dark);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif;
    font-size:1.6rem;
    color:var(--navy);
  }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
  <div class="topbar">
    <div class="brand">Registrar<span>&nbsp;Office</span><small>ISSUE OF RECORD</small></div>
    <nav>
      {% block nav %}{% endblock %}
    </nav>
  </div>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
