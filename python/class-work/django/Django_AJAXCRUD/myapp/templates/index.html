<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>


    <script>

        $(document).ready(function () {
            display()
            $("#upbtn").hide()
        })

        const register = () => {

            const name = $("#name").val()
            const email = $("#email").val()
            const age = $("#age").val()
            let csrfmiddlewaretoken = $('input[name="csrfmiddlewaretoken"]').val();

            $.post('register', { csrfmiddlewaretoken, name, email, age }, function (rt) {

                $("#msg").html(rt)
                $("#name").val("")
                $("#email").val("")
                $("#age").val("")
                display()
            })

        }


        const display = () => {
            $.get('display', {}, function (rt) {

                var rows = ""
                rt.data.map(ele => {

                    rows += ` <tr>
                            <td>${ele.id}</td>
                            <td>${ele.name}</td>
                            <td>${ele.email}</td>
                            <td>${ele.age}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick='retrive(${ele.id})'>
                                    <i class="bi bi-pencil-square"></i> Edit
                                </button>

                                <button class="btn btn-danger btn-sm" onclick='deletestudent(${ele.id})'>
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </td>
                        </tr>`

                })

                $("#tdata").html(rows)
            })
        }




        const search = (q) => {
            $.get('search', { q }, function (rt) {

                var rows = ""
                rt.data.map(ele => {

                    rows += ` <tr>
                            <td>${ele.id}</td>
                            <td>${ele.name}</td>
                            <td>${ele.email}</td>
                            <td>${ele.age}</td>
                            <td>
                                <button class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil-square"></i> Edit
                                </button>

                                <button class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </td>
                        </tr>`

                })

                $("#tdata").html(rows)
            })
        }

        const deletestudent = (id) => {

            r = confirm("Are you sure , want to delete ?")
            if (r === true) {
                $.get('delete', { id }, function (rt) {

                    display()
                })
            }
        }


        const retrive = (id) => {

            $.get('retrive', { id }, function (rt) {

                $("#id").val(rt.student[0].id)
                $("#name").val(rt.student[0].name)
                $("#email").val(rt.student[0].email)
                $("#age").val(rt.student[0].age)

                $("#upbtn").show()
                $("#smbtn").hide()
            })
        }



        const update = () => {

            const id = $("#id").val()
            const name = $("#name").val()
            const email = $("#email").val()
            const age = $("#age").val()
            let csrfmiddlewaretoken = $('input[name="csrfmiddlewaretoken"]').val();

            $.post('update', { csrfmiddlewaretoken, id, name, email, age }, function (rt) {
                alert(rt)
                $("#name").val("")
                $("#email").val("")
                $("#age").val("")
                display()
                $("#smbtn").show()
                $("#upbtn").hide()
            })

        }


    </script>



</head>

<body class="bg-light">

    <div class="container my-5">

        <!-- Registration Form -->
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Student Registration</h3>
            </div>

            <div class="card-body">


                <span id="msg" class="text-success"></span>
                <div class="row g-3">

                    {%csrf_token%}
                    <input type="hidden" id="id">
                    <div class="col-md-4">
                        <label class="form-label">Student Name</label>
                        <input type="text" class="form-control" placeholder="Enter Name" id="name">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter Email" id="email">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" placeholder="Age" id="age">
                    </div>

                    <div class="col-md-2 d-grid">
                        <label class="form-label">&nbsp;</label>
                        <button class="btn btn-success" id="smbtn" onclick="register()">
                            Register
                        </button>

                        <button class="btn btn-success" id="upbtn" onclick="update()">
                            Update
                        </button>
                    </div>



                </div>



            </div>
        </div>

        <!-- Student List -->
        <div class="card shadow-sm mt-4">

            <div class="card-header bg-dark text-white">
                <h3 class="mb-0">Student List</h3>
            </div>

            <div class="card-body">
                <input type="text" class="form-control" placeholder="Search..." onkeyup="search(value)">
                <br>
                <table class="table table-bordered table-hover align-middle text-center">

                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th width="180">Action</th>
                        </tr>
                    </thead>

                    <tbody id="tdata">





                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
