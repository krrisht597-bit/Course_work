<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Student</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .form-container{
      background:white;
      width:320px;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px gray;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
    }

    button{
      width:100%;
      padding:10px;
      background:green;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="form-container">

<h2>Update Student</h2>

<form action="{% url 'update' %}?id={{ student.id }}" method="POST">
    {% csrf_token %}

    <label>Name</label>
    <input type="text" name="name" value="{{ student.name }}" required>

    <label>Email</label>
    <input type="email" name="email" value="{{ student.email }}" required>

    <label>Age</label>
    <input type="number" name="age" value="{{ student.age }}" required>

    <button type="submit">Update</button>

</form>

<br>

<a href="{% url 'display' %}">View All Students</a>

</div>

</body>
</html>
