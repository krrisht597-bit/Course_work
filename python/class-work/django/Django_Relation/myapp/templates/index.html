<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center mb-0">Product Registration</h3>
                    </div>

                    <div class="card-body">

                        <form action="{%url 'create'%}" method="post" enctype="multipart/form-data">

                            {%csrf_token%}
                            <input type="hidden" name="id" value="{{pro.id}}">
                    <!-- Product Name -->
                           <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text"
                     class="form-control"
                     placeholder="Enter Product Name"
                     name="name"
                     value="{{ pro.name|default:'' }}">
                    </div>

                    <!-- Price -->
                            <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input
                        type="number"
                        class="form-control"
                        placeholder="Enter Price"
                        name="price"
                        value="{{ pro.price|default:'' }}">
                       </div>
            
                     <!-- Quantity -->
                        <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input
                        type="number"
                        class="form-control"
                        placeholder="Enter Quantity"
                        name="qty"
                        value="{{ pro.qty|default:'' }}">
                        </div>

                            <!-- Category -->
                            <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-select" name="cat">
                                {% for cat in categories %}
                                <option value="{{ cat.id }}"
                                {% if pro and pro.category.id == cat.id %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                            <!--image-->
                            <div class="mb-3">
                                <label class="form-label">Image</label>
                                {% if pro %}
                                    <img src="{{ pro.image.url }}" width="100" class="mb-2">
                                {% endif %}
                                <input type="file" class="form-control" name="image">
                            </div>

                            <!-- Buttons -->
                            <div class="d-grid gap-2">
                                {% if pro %}
                                    <button type="submit" class="btn btn-warning">
                                        Update Product
                                    </button>
                                {% else %}
                                    <button type="submit" class="btn btn-success">
                                        Register Product
                                    </button>
                                {% endif %}
                                <a href="{% url 'display' %}" class="btn btn-secondary">
                                    Display
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
