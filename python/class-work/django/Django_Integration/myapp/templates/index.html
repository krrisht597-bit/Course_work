<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment & Mail</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #224abe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .25);
        }

        .left-panel {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 40px;
        }

        .right-panel {
            background: #fff;
            padding: 40px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }

        h3 {
            font-weight: 700;
        }

        .section-title {
            border-left: 5px solid #0d6efd;
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .payment-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }

        .mail-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
        }

        .msg {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="card main-card">
            <div class="row g-0">

                <!-- Left Panel -->
                <div class="col-md-4 left-panel d-flex flex-column justify-content-center text-center">

                    <i class="bi bi-wallet2 display-1 mb-4"></i>

                    <h2>Tops Technologies</h2>

                    <p class="mt-3">
                        Secure Razorpay Payment Gateway<br>
                        & Email Service
                    </p>

                </div>

                <!-- Right Panel -->
                <div class="col-md-8 right-panel">

                    <!-- Payment Section -->
                    <div class="payment-box">

                        <h3 class="section-title">
                            <i class="bi bi-credit-card"></i>
                            Razorpay Payment
                        </h3>

                        <div class="mb-3">
                            <label class="form-label">Enter Amount</label>
                            <input type="text" class="form-control" id="amt" placeholder="Enter Amount">
                        </div>

                        <button class="btn btn-primary w-100" id="rzp-button1">
                            <i class="bi bi-currency-rupee"></i>
                            Pay with Razorpay
                        </button>

                    </div>

                    <!-- Mail Section -->
                    <div class="mail-box">

                        <h3 class="section-title">
                            <i class="bi bi-envelope-fill"></i>
                            Send Mail
                        </h3>

                        <span class="msg">{{msg}}</span>

                        <form action="{% url 'mail' %}">

                            <div class="mb-3">
                                <label class="form-label">To</label>
                                <input type="email" class="form-control" name="to" placeholder="Recipient Email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Subject</label>
                                <input type="text" class="form-control" name="subject" placeholder="Mail Subject">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="5" name="message"
                                    placeholder="Type your message here..."></textarea>
                            </div>

                            <button class="btn btn-success w-100">
                                <i class="bi bi-send-fill"></i>
                                Send Mail
                            </button>

                        </form>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>

        document.getElementById('rzp-button1').onclick = function (e) {

            e.preventDefault();

            var amt = $("#amt").val()

            $.get('payment', { amt }, function (rt) {

                var options = {
                    "key": "rzp_test_TDGkCn2xBLDD68",
                    "amount": rt.amount,
                    "currency": "INR",
                    "name": "Tops",
                    "description": "Test Transaction",
                    "image": "https://example.com/your_logo",
                    "order_id": rt.id,
                    "handler": function (response) {
                        alert(response.razorpay_payment_id);
                        alert(response.razorpay_order_id);
                        alert(response.razorpay_signature)
                    },
                    "prefill": {
                        "name": "<name>",
                        "email": "<email>",
                        "contact": "<phone>"
                    },
                    "notes": {
                        "address": "Razorpay Corporate Office"
                    },
                    "theme": {
                        "color": "#0d6efd"
                    }
                };

                var rzp1 = new Razorpay(options);

                rzp1.on('payment.failed', function (response) {
                    alert(response.error.code);
                    alert(response.error.description);
                    alert(response.error.source);
                    alert(response.error.step);
                    alert(response.error.reason);
                    alert(response.error.metadata.order_id);
                    alert(response.error.metadata.payment_id);
                });

                rzp1.open();

            });

        }

    </script>

</body>

</html>
