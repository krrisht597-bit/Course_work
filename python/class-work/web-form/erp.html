<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="erp.css">
    <link rel="icon" href="topslogo.ico">
    <title>Welcome to TOPS Management System</title>
</head>

<body>


    <div class="container">

        <header>
            <div class="logo">
                <img src="logo-tops.png" alt="">
            </div>
            <div class="title">
                Student Registration & Accounting System
            </div>
        </header>
        <div class="main">

            <div class="form">
                <h3 align="center">Login</h3>
                <br>
                <hr>
                <br>
                <table>
                    <tr>
                        <td><label for="">Username</label></td>
                        <td><input type="text" placeholder="Enter username"></td>
                    </tr>
                    <tr>
                        <td><label for="">Password</label></td>
                        <td><input type="password" placeholder="Enter password"></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <button type="submit">Submit</button>
                            <button type="reset">Reset</button>
                        </td>
                    </tr>
                </table>

            </div>

        </div>
        <footer>
            <span>Copyright © 2026 TOPS International</span>
        </footer>

    </div>


</body>

</html>
