<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to TOPS Management System</title>
    <link rel="stylesheet" href="gpt.css">
</head>

<body>

    <div class="container">

        <header>
            <div class="logo">
                <img src="logo-tops.png" alt="TOPS Logo">
            </div>
            <div class="title">
                Student Registration & Accounting System
            </div>
        </header>

        <div class="main">

            <div class="form">
                <h2>Login</h2>
                <p>Please sign in to continue</p>

                <form>
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" placeholder="Enter username">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter password">
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn-login">Login</button>
                        <button type="reset" class="btn-reset">Reset</button>
                    </div>
                </form>
            </div>

        </div>

        <footer>
            Copyright © 2026 TOPS International
        </footer>

    </div>

</body>

</html>
