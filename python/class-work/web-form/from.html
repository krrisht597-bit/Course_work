<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <style>

            .tf{
                width: 200px; 
                height: 30px; 
                border: 1px solid black; 
                border-radius: 5px; 
                background-color:bisque; 
                color: chocolate;
            }

    </style>
</head>

<body>

    <form action="" method="post">
        <fieldset>
            <legend>Registration Form</legend>
            <label for="uname">Username</label>
            <input type="text" name="uname" id="uname" placeholder="Enter username" class="tf"
            >
            <br>
            <br>
            <label for="email">Email</label>
            <input type="text" id="email" name="email" class="tf">
            <br><br>
            <label for="">Password</label>
            <input type="password" name="pass" class="tf">
            <br><br>
            <label for="">Gender</label>
            <input type="radio" name="gender" value="male" checked>Male
            <input type="radio" name="gender" value="female">Female
            <br><br>
            <label for="">Languages</label>
            <input type="checkbox" value="guj" name="lang">Gujarati
            <input type="checkbox" name="lang" value="hindi">Hindi
            <input type="checkbox" name="lang" value="eng">English
            <br><br>
            <label for="">Country</label>
            <select name="country" id="" class="tf">
                <option value="1">India</option>
                <option value="2">USA</option>
                <option value="3">UK</option>
                <option value="4">Canada</option>

            </select>

            <br><br>
            <label for="">Address</label>
            <textarea rows="3" cols="20" name="adr"></textarea>

            <br><br>
            <label for="">Date</label>
            <input type="date" name="date" class="tf">

            <br><br>
            <label for="">Color</label>
            <input type="color" name="color" class="tf">

            <br>
            <br>

            <label for="">Age</label>
            <input type="number" name="age" class="tf">
            <br><br>

            <input type="submit">
            <input type="reset">

        </fieldset>
    </form>

</body>

</html>
